services:
  - type: web
    name: budget-tracker
    runtime: python
    plan: free
    buildCommand: |
      cd frontend && npm install && npm run build
      cd ../backend && pip install -r requirements.txt
      mkdir -p templates staticfiles
      cp ../frontend/dist/index.html templates/
      cp -r ../frontend/dist/assets staticfiles/
      python manage.py collectstatic --noinput
    startCommand: |
      cd backend && gunicorn budget_api.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://*.onrender.com,http://localhost:5173,http://127.0.0.1:5173"
      - key: DATABASE_URL
        fromDatabase:
          name: budget-db
          property: connectionString
      - key: WEB_CONCURRENCY
        value: "2"
      - key: TZ
        value: "Asia/Manila"
    autoDeploy: true

databases:
  - name: budget-db
    plan: free
    databaseName: budget_db
    user: budget_user
