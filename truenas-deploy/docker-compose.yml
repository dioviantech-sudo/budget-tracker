version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: budget_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-budget_db}
      POSTGRES_USER: ${DB_USER:-budget_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - budget_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-budget_user} -d ${DB_NAME:-budget_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../truenas-deploy/Dockerfile.backend
    container_name: budget_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    depends_on:
      db:
        condition: service_healthy
    networks:
      - budget_network
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             python manage.py seed_defaults --email=${ADMIN_EMAIL:-admin@example.com} || true &&
             gunicorn budget_api.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60"

  nginx:
    image: nginx:alpine
    container_name: budget_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./staticfiles:/usr/share/nginx/html/static:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - budget_network

networks:
  budget_network:
    driver: bridge
